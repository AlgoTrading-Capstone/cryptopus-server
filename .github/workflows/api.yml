name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: services/api
        env:
          DJANGO_SETTINGS_MODULE: cryptopus.settings.test
        run: |
          pytest tests/ -v