services:
  postgres:
    image: postgres:16
    container_name: cryptopus-postgres
    environment:
      POSTGRES_DB: cryptopus
      POSTGRES_USER: cryptopus
      POSTGRES_PASSWORD: cryptopus123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cryptopus-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: cryptopus-api
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=cryptopus.settings.development
      - DJANGO_SUPERUSER_EMAIL=admin@cryptopus.local
      - DJANGO_SUPERUSER_PASSWORD=admin123
      - DJANGO_SUPERUSER_FIRST_NAME=Admin
      - DJANGO_SUPERUSER_LAST_NAME=User
    volumes:
      - ./services/api:/app
    command: ["sh", "-c", "sed -i 's/\\r$//' /app/entrypoint.sh && exec sh /app/entrypoint.sh"]
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data: